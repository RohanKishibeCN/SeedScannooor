name: Generate Mnemonics

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.20.2"

      - name: Ensure main branch
        run: git checkout main

      - name: Generate mnemonics
        run: |
          npm ci --prefix wallet_scanner
          npm run build --prefix wallet_scanner
          node wallet_scanner/dist/generate-mnemonics.js mnemonics.txt 100

      - name: Commit and push changes
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}
          git add mnemonics.txt
          git diff --staged --quiet || git commit -m "Update mnemonics - $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin HEAD:main
